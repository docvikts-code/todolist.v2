name: TaskFlow Push Notifications

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Send OneSignal push for upcoming deadlines
        env:
          ONESIGNAL_APP_ID: "9b0e3726-37de-4173-b378-cc446ca4fd73"
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
          SITE_URL: "https://docvikts-code.github.io/todolist.v2/"
        run: |
          python3 << 'PYEOF'
          import json, os, time, urllib.request
          from datetime import datetime

          APP_ID  = os.environ['ONESIGNAL_APP_ID']
          API_KEY = os.environ['ONESIGNAL_API_KEY']
          SITE_URL = os.environ['SITE_URL']

          def api_get(url):
            req = urllib.request.Request(url, headers={"Authorization": f"Key {API_KEY}"})
            return json.loads(urllib.request.urlopen(req, timeout=10).read())

          def api_post(url, data, method="POST"):
            req = urllib.request.Request(url,
              data=json.dumps(data).encode(),
              headers={"Authorization": f"Key {API_KEY}", "Content-Type": "application/json"},
              method=method)
            return json.loads(urllib.request.urlopen(req, timeout=10).read())

          # Fetch players via v1 API (has tags)
          try:
            result = api_get(f"https://onesignal.com/api/v1/players?app_id={APP_ID}&limit=200")
            players = result.get('players', [])
          except Exception as e:
            print(f"Failed to fetch players: {e}")
            exit(0)

          if not players:
            print("No subscribers yet")
            exit(0)

          print(f"Found {len(players)} players")

          now_ms = time.time() * 1000
          REMINDERS = [
            {"min": 1440, "label": "24 години", "emoji": "📅", "key": "24h"},
            {"min": 60,   "label": "1 годину",  "emoji": "⏰", "key": "1h"},
            {"min": 5,    "label": "5 хвилин",  "emoji": "🚨", "key": "5m"},
          ]

          sent_count = 0

          for player in players:
            player_id = player.get('id')
            ext_id = player.get('external_user_id', '')
            tags = player.get('tags', {})

            if not player_id:
              continue

            # If player has no tags, try fetching user by external_id
            if not tags.get('tasks') and ext_id:
              try:
                user = api_get(f"https://onesignal.com/api/v1/players/{player_id}?app_id={APP_ID}")
                tags = user.get('tags', {})
              except:
                pass

            try:
              tasks = json.loads(tags.get('tasks', '[]'))
            except:
              tasks = []

            try:
              sent_keys = json.loads(tags.get('sent_notifs', '{}'))
            except:
              sent_keys = {}

            if not tasks:
              print(f"Player {ext_id or player_id[:8]}: no tasks")
              continue

            print(f"Player {ext_id or player_id[:8]}: {len(tasks)} tasks")
            updated_sent = dict(sent_keys)

            for task in tasks:
              if task.get('done') or not task.get('deadline'):
                continue
              try:
                dl_ms = datetime.fromisoformat(
                  task['deadline'] + 'T' + (task.get('time') or '23:59')
                ).timestamp() * 1000
              except:
                continue

              diff_min = (dl_ms - now_ms) / 60000
              print(f"  Task '{task['title']}': {diff_min:.1f} min to deadline")

              for r in REMINDERS:
                key = f"{task['id']}_{r['key']}"
                if sent_keys.get(key):
                  continue
                if not (r['min'] - 6 < diff_min <= r['min']):
                  continue

                try:
                  resp = api_post("https://onesignal.com/api/v1/notifications", {
                    "app_id": APP_ID,
                    "include_player_ids": [player_id],
                    "headings": {"en": f"{r['emoji']} «{task['title']}»"},
                    "contents": {"en": f"До дедлайну залишилось {r['label']}"},
                    "url": SITE_URL,
                  })
                  print(f"  ✅ {r['key']} → '{task['title']}' → {resp.get('id','')}")
                  sent_count += 1
                  updated_sent[key] = True
                except Exception as ex:
                  print(f"  ❌ Push failed: {ex}")

            # Update sent_notifs tag
            if updated_sent != sent_keys:
              try:
                api_post(
                  f"https://onesignal.com/api/v1/players/{player_id}?app_id={APP_ID}",
                  {"app_id": APP_ID, "tags": {"sent_notifs": json.dumps(updated_sent)}},
                  method="PUT"
                )
                print(f"  Tags updated")
              except Exception as ex:
                print(f"  Tag update failed: {ex}")

          print(f"Done. Sent {sent_count} notifications.")
          PYEOF
