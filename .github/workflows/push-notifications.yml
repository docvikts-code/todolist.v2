name: TaskFlow Push Notifications

on:
  schedule:
    # Runs every 5 minutes (GitHub minimum is 5 min)
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Check tasks and send FCM push
        env:
          FIREBASE_PROJECT_ID: taskflow-aff2b
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
        run: |
          python3 << 'PYEOF'
          import json, os, time, urllib.request, urllib.error

          PROJECT_ID = os.environ['FIREBASE_PROJECT_ID']
          SA_JSON = json.loads(os.environ['GOOGLE_SERVICE_ACCOUNT'])
          DB_URL = os.environ['FIREBASE_DB_URL'].rstrip('/')

          # ── Get OAuth2 token via Service Account ──────────────────────────────
          import base64, hashlib, hmac
          from datetime import datetime, timezone

          def get_access_token(sa):
              import urllib.parse
              
              # Build JWT
              header = base64.urlsafe_b64encode(json.dumps({"alg":"RS256","typ":"JWT"}).encode()).rstrip(b'=').decode()
              now = int(time.time())
              payload = base64.urlsafe_b64encode(json.dumps({
                  "iss": sa['client_email'],
                  "scope": "https://www.googleapis.com/auth/firebase.messaging https://www.googleapis.com/auth/userinfo.email",
                  "aud": "https://oauth2.googleapis.com/token",
                  "iat": now,
                  "exp": now + 3600
              }).encode()).rstrip(b'=').decode()
              
              msg = f"{header}.{payload}".encode()
              
              # Sign with RSA private key using cryptography lib
              from cryptography.hazmat.primitives import hashes, serialization
              from cryptography.hazmat.primitives.asymmetric import padding
              
              key = serialization.load_pem_private_key(sa['private_key'].encode(), password=None)
              sig = base64.urlsafe_b64encode(key.sign(msg, padding.PKCS1v15(), hashes.SHA256())).rstrip(b'=').decode()
              jwt = f"{header}.{payload}.{sig}"
              
              # Exchange JWT for access token
              data = urllib.parse.urlencode({
                  "grant_type": "urn:ietf:params:oauth:grant-type:jwt-bearer",
                  "assertion": jwt
              }).encode()
              req = urllib.request.Request("https://oauth2.googleapis.com/token", data=data)
              resp = json.loads(urllib.request.urlopen(req).read())
              return resp['access_token']

          token = get_access_token(SA_JSON)
          headers = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}

          # ── Read all FCM tokens and tasks from Firebase DB ────────────────────
          def db_get(path):
              url = f"{DB_URL}/{path}.json?auth={token}"
              # Use access token for DB too (requires DB rules to allow authenticated access)
              req = urllib.request.Request(f"{DB_URL}/{path}.json", headers={"Authorization": f"Bearer {token}"})
              try:
                  return json.loads(urllib.request.urlopen(req).read())
              except:
                  return None

          users_data = db_get("users")
          if not users_data:
              print("No users found")
              exit(0)

          now_ms = time.time() * 1000
          REMINDERS = [
              {"min": 1440, "label": "24 години",  "emoji": "📅", "key": "24h"},
              {"min": 60,   "label": "1 годину",   "emoji": "⏰", "key": "1h"},
              {"min": 5,    "label": "5 хвилин",   "emoji": "🚨", "key": "5m"},
          ]

          fcm_url = f"https://fcm.googleapis.com/v1/projects/{PROJECT_ID}/messages:send"

          sent_count = 0
          for uid, user in users_data.items():
              fcm_token = user.get("fcmToken")
              tasks = user.get("tasks", {})
              sent_notifs = user.get("sentNotifs", {})
              if not fcm_token or not tasks:
                  continue

              for task_id, task in tasks.items():
                  if task.get("done") or not task.get("deadline"):
                      continue
                  
                  deadline_str = task["deadline"] + "T" + (task.get("time") or "23:59")
                  try:
                      from datetime import datetime
                      dl_dt = datetime.fromisoformat(deadline_str)
                      dl_ms = dl_dt.timestamp() * 1000
                  except:
                      continue

                  diff_min = (dl_ms - now_ms) / 60000

                  for r in REMINDERS:
                      notif_key = f"{task_id}_{r['key']}"
                      already_sent = sent_notifs.get(notif_key)
                      
                      if diff_min <= r["min"] and diff_min > r["min"] - 6 and not already_sent:
                          # Send FCM push
                          msg = {
                              "message": {
                                  "token": fcm_token,
                                  "notification": {
                                      "title": f"{r['emoji']} «{task['title']}»",
                                      "body": f"До дедлайну залишилось {r['label']}"
                                  },
                                  "webpush": {
                                      "notification": {
                                          "icon": "https://docvikts-code.github.io/todolist.v2/icons/icon-192.png",
                                          "badge": "https://docvikts-code.github.io/todolist.v2/icons/icon-96.png",
                                          "vibrate": [200, 100, 200],
                                          "tag": notif_key
                                      },
                                      "fcm_options": {
                                          "link": "https://docvikts-code.github.io/todolist.v2/"
                                      }
                                  },
                                  "data": {"taskId": task_id, "uid": uid}
                              }
                          }
                          req = urllib.request.Request(
                              fcm_url,
                              data=json.dumps(msg).encode(),
                              headers={**headers, "Content-Type": "application/json"},
                              method="POST"
                          )
                          try:
                              urllib.request.urlopen(req)
                              print(f"✅ Sent {r['key']} reminder for '{task['title']}' to {uid[:8]}...")
                              sent_count += 1
                              # Mark as sent in DB
                              mark_req = urllib.request.Request(
                                  f"{DB_URL}/users/{uid}/sentNotifs/{notif_key}.json",
                                  data=json.dumps(True).encode(),
                                  headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"},
                                  method="PUT"
                              )
                              urllib.request.urlopen(mark_req)
                          except Exception as ex:
                              print(f"❌ FCM error: {ex}")

          print(f"Done. Sent {sent_count} notifications.")
          PYEOF
          pip install cryptography -q
