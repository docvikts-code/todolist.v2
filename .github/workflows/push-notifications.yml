name: TaskFlow Push Notifications

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram reminders for upcoming deadlines
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ONESIGNAL_APP_ID: "9b0e3726-37de-4173-b378-cc446ca4fd73"
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GH_REPO: "docvikts-code/todolist.v2"
        run: |
          python3 << 'PYEOF'
          import json, os, time, urllib.request, urllib.parse
          from datetime import datetime, timezone, timedelta

          TG_TOKEN = os.environ['TELEGRAM_TOKEN']
          TG_CHAT  = os.environ['TELEGRAM_CHAT_ID']
          OS_APP   = os.environ['ONESIGNAL_APP_ID']
          OS_KEY   = os.environ['ONESIGNAL_API_KEY']
          GH_TOKEN = os.environ['GH_TOKEN']
          GH_REPO  = os.environ['GH_REPO']
          KYIV     = timezone(timedelta(hours=2))
          SITE_URL = "https://storied-piroshki-5d1420.netlify.app"

          def tg_send(text):
            data = urllib.parse.urlencode({
              'chat_id': TG_CHAT,
              'text': text,
              'parse_mode': 'HTML'
            }).encode()
            req = urllib.request.Request(
              f"https://api.telegram.org/bot{TG_TOKEN}/sendMessage", data=data)
            return json.loads(urllib.request.urlopen(req, timeout=10).read())

          def os_get(url):
            req = urllib.request.Request(url, headers={"Authorization": f"Key {OS_KEY}"})
            return json.loads(urllib.request.urlopen(req, timeout=10).read())

          def gh_get_var(name):
            url = f"https://api.github.com/repos/{GH_REPO}/actions/variables/{name}"
            req = urllib.request.Request(url, headers={
              "Authorization": f"Bearer {GH_TOKEN}",
              "Accept": "application/vnd.github.v3+json"
            })
            try:
              return json.loads(urllib.request.urlopen(req, timeout=10).read()).get('value', '{}')
            except:
              return '{}'

          def gh_set_var(name, value):
            url = f"https://api.github.com/repos/{GH_REPO}/actions/variables/{name}"
            data = json.dumps({"name": name, "value": value}).encode()
            # Try PATCH first, then POST
            for method in ["PATCH", "POST"]:
              try:
                req = urllib.request.Request(url, data=data, headers={
                  "Authorization": f"Bearer {GH_TOKEN}",
                  "Accept": "application/vnd.github.v3+json",
                  "Content-Type": "application/json"
                }, method=method)
                urllib.request.urlopen(req, timeout=10)
                return True
              except Exception as e:
                if method == "PATCH":
                  continue
                print(f"Failed to set var: {e}")
            return False

          # Load sent_notifs from GitHub Variables
          print("Loading sent_notifs from GitHub Variables...")
          try:
            sent_keys = json.loads(gh_get_var("SENT_NOTIFS"))
          except:
            sent_keys = {}
          print(f"Loaded {len(sent_keys)} sent keys")

          # Fetch tasks from OneSignal
          try:
            result = os_get(f"https://onesignal.com/api/v1/players?app_id={OS_APP}&limit=200")
            players = result.get('players', [])
          except Exception as e:
            print(f"OneSignal fetch failed: {e}")
            players = []

          now_ms = time.time() * 1000
          now_kyiv = datetime.now(KYIV).strftime('%H:%M')
          print(f"Current Kyiv time: {now_kyiv}")

          REMINDERS = [
            {"min": 1440, "label": "24 години", "emoji": "📅", "key": "24h"},
            {"min": 60,   "label": "1 годину",  "emoji": "⏰", "key": "1h"},
            {"min": 5,    "label": "5 хвилин",  "emoji": "🚨", "key": "5m"},
          ]

          # Collect unique tasks across all players
          all_tasks = {}
          for player in players:
            tags = player.get('tags', {})
            if not tags.get('tasks'):
              continue
            try:
              tasks = json.loads(tags.get('tasks', '[]'))
              for task in tasks:
                tid = task.get('id')
                if tid and not task.get('done') and tid not in all_tasks:
                  all_tasks[tid] = task
            except:
              pass

          print(f"Total unique tasks: {len(all_tasks)}")

          sent_count = 0
          updated_sent = dict(sent_keys)

          for tid, task in all_tasks.items():
            if not task.get('deadline'):
              continue
            try:
              dl_naive = datetime.fromisoformat(task['deadline'] + 'T' + (task.get('time') or '23:59'))
              dl_kyiv = dl_naive.replace(tzinfo=KYIV)
              dl_ms = dl_kyiv.timestamp() * 1000
            except:
              continue

            diff_min = (dl_ms - now_ms) / 60000
            print(f"Task '{task['title']}': {diff_min:.1f} min to deadline")

            for r in REMINDERS:
              key = f"{tid}_{r['key']}"
              if sent_keys.get(key):
                continue
              if not (r['min'] - 6 < diff_min <= r['min']):
                continue

              msg = (
                f"{r['emoji']} <b>«{task['title']}»</b>\n"
                f"До дедлайну залишилось <b>{r['label']}</b>\n"
                f"🕐 {task['deadline']} о {task.get('time','23:59')}\n"
                f"<a href='{SITE_URL}'>Відкрити TaskFlow</a>"
              )
              try:
                tg_send(msg)
                print(f"  ✅ {r['key']} → '{task['title']}'")
                sent_count += 1
                updated_sent[key] = True
              except Exception as ex:
                print(f"  ❌ TG failed: {ex}")

          # Clean up old sent_notifs (older than 7 days) to keep variable small
          now_s = time.time()
          cleaned = {k: v for k, v in updated_sent.items()
                     if abs(now_s - int(k.split('_')[0])/1000) < 7*86400}

          # Save back to GitHub Variables
          if cleaned != sent_keys:
            if gh_set_var("SENT_NOTIFS", json.dumps(cleaned)):
              print(f"Saved {len(cleaned)} sent keys to GitHub Variables")
            else:
              print("Failed to save sent_notifs")

          print(f"Done. Sent {sent_count} notifications.")
          PYEOF
