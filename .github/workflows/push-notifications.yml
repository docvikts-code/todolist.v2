name: TaskFlow Push Notifications

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Send OneSignal push for upcoming deadlines
        env:
          ONESIGNAL_APP_ID: "9b0e3726-37de-4173-b378-cc446ca4fd73"
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
          SITE_URL: "https://docvikts-code.github.io/todolist.v2/"
        run: |
          python3 << 'PYEOF'
          import json, os, time, urllib.request
          from datetime import datetime

          APP_ID  = os.environ['ONESIGNAL_APP_ID']
          API_KEY = os.environ['ONESIGNAL_API_KEY']
          SITE_URL = os.environ['SITE_URL']

          def api_get(url):
            req = urllib.request.Request(url, headers={"Authorization": f"Key {API_KEY}"})
            return json.loads(urllib.request.urlopen(req).read())

          def api_post(url, data, method="POST"):
            req = urllib.request.Request(url, data=json.dumps(data).encode(),
              headers={"Authorization": f"Key {API_KEY}", "Content-Type": "application/json"}, method=method)
            return json.loads(urllib.request.urlopen(req).read())

          # Fetch subscribers
          try:
            subs = api_get(f"https://api.onesignal.com/apps/{APP_ID}/subscriptions?limit=200").get('subscriptions', [])
          except Exception as e:
            print(f"Failed: {e}"); exit(0)

          if not subs:
            print("No subscribers"); exit(0)
          print(f"Found {len(subs)} subscribers")

          now_ms = time.time() * 1000
          REMINDERS = [
            {"min": 1440, "label": "24 години", "emoji": "📅", "key": "24h"},
            {"min": 60,   "label": "1 годину",  "emoji": "⏰", "key": "1h"},
            {"min": 5,    "label": "5 хвилин",  "emoji": "🚨", "key": "5m"},
          ]

          sent_count = 0
          for sub in subs:
            ext_id = sub.get('external_id') or sub.get('id')
            sub_id = sub.get('id')
            if not sub_id: continue

            try:
              user = api_get(f"https://api.onesignal.com/apps/{APP_ID}/users/by/external_id/{ext_id}")
              tags = user.get('properties', {}).get('tags', {})
            except: continue

            try: tasks = json.loads(tags.get('tasks', '[]'))
            except: continue
            try: sent_keys = json.loads(tags.get('sent_notifs', '{}'))
            except: sent_keys = {}

            for task in tasks:
              if task.get('done') or not task.get('deadline'): continue
              try:
                dl_ms = datetime.fromisoformat(task['deadline'] + 'T' + (task.get('time') or '23:59')).timestamp() * 1000
              except: continue
              diff_min = (dl_ms - now_ms) / 60000

              for r in REMINDERS:
                key = f"{task['id']}_{r['key']}"
                if sent_keys.get(key): continue
                if not (r['min'] - 6 < diff_min <= r['min']): continue
                try:
                  api_post("https://api.onesignal.com/notifications", {
                    "app_id": APP_ID,
                    "include_subscription_ids": [sub_id],
                    "headings": {"en": f"{r['emoji']} «{task['title']}»"},
                    "contents": {"en": f"До дедлайну залишилось {r['label']}"},
                    "url": SITE_URL,
                  })
                  print(f"✅ {r['key']} → '{task['title']}'")
                  sent_count += 1
                  sent_keys[key] = True
                except Exception as ex:
                  print(f"❌ {ex}")

            if sent_keys:
              try:
                api_post(f"https://api.onesignal.com/apps/{APP_ID}/users/by/external_id/{ext_id}",
                  {"properties": {"tags": {"sent_notifs": json.dumps(sent_keys)}}}, method="PATCH")
              except: pass

          print(f"Done. Sent {sent_count} notifications.")
          PYEOF
